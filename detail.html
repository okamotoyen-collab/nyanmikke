<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にゃんみっけ！詳細</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #fff7f3;
    color: #3f3333;
}

.page {
    width: 90%;
    max-width: 850px;
    margin: 0 auto;
    padding: 30px 0 80px;
}

h1 {
    color: #ff6f8f;
}

.photo {
    width: 100%;
    border-radius: 28px;
    margin-bottom: 20px;
}

.card {
    background: white;
    border-radius: 28px;
    padding: 25px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
}

a {
    color: #ff6f8f;
    font-weight: bold;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="page">

    <h1>にゃんみっけ！🐾</h1>

    <div class="card">

        <div th:each="photo : ${photos}">
            <img class="photo" th:src="${photo.imageUrl}">
        </div>

        <p>📍 <span th:text="${post.place}"></span></p>
        <p>🏷️ <span th:text="${post.tag}"></span></p>
        <p>🕒 <span th:text="${post.createdAt}"></span></p>
        <p th:text="${post.memo}"></p>

        <p>
            <a th:href="'https://www.google.com/maps/search/?api=1&query=' + ${post.place}"
               target="_blank">
               🗺️ 地図で見る
            </a>
        </p>

        <p>
            <a href="/">← 一覧に戻る</a>
        </p>

    </div>

</div>

</body>
</html>
